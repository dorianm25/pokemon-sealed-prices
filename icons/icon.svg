<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34c853"/>
      <stop offset="100%" stop-color="#1f8a3a"/>
    </linearGradient>
    <linearGradient id="bottomGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f28"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <radialGradient id="centerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3ddb6b"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Cercle de fond -->
  <circle cx="96" cy="96" r="88" fill="url(#bottomGrad)"/>
  <!-- Moitie superieure verte -->
  <path d="M 8 96 a 88 88 0 0 1 176 0 z" fill="url(#topGrad)"/>
  <!-- Bande centrale sombre -->
  <rect x="8" y="92" width="176" height="8" fill="#0a0d12"/>
  <!-- Bouton central -->
  <circle cx="96" cy="96" r="22" fill="#0e1117" stroke="#2ea043" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="96" cy="96" r="11" fill="url(#centerGrad)"/>
  <circle cx="93" cy="93" r="3" fill="#9bf0b3" opacity="0.6"/>
  <!-- Anneau exterieur -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#1e2128" stroke-width="3"/>
</svg>
